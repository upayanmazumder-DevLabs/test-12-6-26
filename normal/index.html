<html>
    <head>
        <title>Title</title>
        <link rel="stylesheet" href="style.css">
        <script src="./script.js"></script>
    </head>
    <body>
        <h1>H1</h1>
        <h2>H2</h2>
        <h3>H3</h3>

        <p>Normal is the default font weight. It is the same as 400.</p>

        <button>Button</button>

        <button id="car" class="vehicles" style="background-color: #d8f436;">Car</button>
        <button id="bus" class="vehicles" style="background-color: #008CBA;">Bus</button>

        <button id="flower" onclick="varuna()" onmouseout="revertVaruna()">Flower</button>
        
        <br/>

        <button 
            id="show-alert" 
            style="background-color: blue; border: none; color: white; padding: 15px 32px; text-align: center; text-decoration: none; display: inline-block; font-size: 16px; margin: 4px 2px; cursor: pointer;" 
            onclick="showAlert()"
            onMouseOver="changeBackgroundColor()"
            onMouseOut="document.body.style.backgroundColor = '';"
            >
            Show Alert
        </button>
    </body>
</html>
